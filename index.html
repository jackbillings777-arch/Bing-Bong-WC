const ROUND_LABELS = {R32:"Round of 32", R16:"Round of 16", QF:"Quarterfinals", SF:"Semifinals", "3RD":"3rd Place", FINAL:"Final"};
const ROUND_ORDER = ["R32","R16","QF","SF","3RD","FINAL"];

// Knockout advancement points
const KO_ADVANCE_PTS = {R32:4, R16:4, QF:4, SF:4, FINAL:4};
const KO_ADVANCE_PTS_PENS = {R32:3, R16:3, QF:3, SF:3, FINAL:3};
const KO_WC_WIN_BONUS = 5;
const KO_3RD_PLACE_PTS = 3;

function koWinner(m) {
  if (m.homeScore == null || m.awayScore == null) return null;
  if (m.homeScore > m.awayScore) return "home";
  if (m.awayScore > m.homeScore) return "away";
  if (m.penaltyWinner) return m.penaltyWinner;
  return null; // tied, no penalty winner set yet
}

function koLoser(m) {
  const w = koWinner(m);
  if (!w) return null;
  return w === "home" ? "away" : "home";
}

function calcKnockoutScores(koMatches) {
  const pts = {};
  PLAYERS.forEach(p => { pts[p.name] = 0; });

  koMatches.forEach(m => {
    const w = koWinner(m);
    if (!w) return;
    const winnerTeam = norm(w === "home" ? m.home : m.away);
    const wasPens = m.homeScore === m.awayScore;
    const ownerP = t2p[winnerTeam];
    if (!ownerP) return;

    if (m.round === "FINAL") {
      pts[ownerP] += (wasPens ? KO_ADVANCE_PTS_PENS.FINAL : KO_ADVANCE_PTS.FINAL) + KO_WC_WIN_BONUS;
    } else if (m.round === "3RD") {
      pts[ownerP] += KO_3RD_PLACE_PTS;
    } else {
      pts[ownerP] += wasPens ? KO_ADVANCE_PTS_PENS[m.round] : KO_ADVANCE_PTS[m.round];
    }
  });

  return pts;
}

const ALIASES = {"cote d'ivoire":"Cote D'Ivoire","ivory coast":"Cote D'Ivoire","czechia":"Czech Republic","czech republic":"Czech Republic","türkiye":"Turkey","turkey":"Turkey","usa":"United States","united states":"United States","south korea":"South Korea","korea republic":"South Korea","bosnia and herzegovina":"Bosnia & Herzegovina","bosnia & herzegovina":"Bosnia & Herzegovina","dr congo":"DR Congo","cape verde":"Cape Verde","curacao":"Curaçao","curaçao":"Curaçao"};
// Strip any emoji/flag characters and trim whitespace before matching, so adding
// a flag emoji to a team name in the bracket admin won\'t break player tracking.
const stripEmoji = s => s.replace(/[\u{1F1E6}-\u{1F1FF}\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, "").trim();
const norm = n => { if (!n) return n; const clean = stripEmoji(n); return ALIASES[clean.toLowerCase()] || clean; };
const t2p = {};
PLAYERS.forEach(p => p.teams.forEach(t => { t2p[t] = p.name; }));

function calcScores(matches, koMatches) {
  const pts = {};
  PLAYERS.forEach(p => { pts[p.name] = 0; });
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const hp = t2p[norm(m.home)], ap = t2p[norm(m.away)];
    if (m.homeScore > m.awayScore) { if(hp) pts[hp]+=3; }
    else if (m.homeScore < m.awayScore) { if(ap) pts[ap]+=3; }
    else { if(hp) pts[hp]+=1; if(ap) pts[ap]+=1; }
  });
  if (koMatches) {
    const koPts = calcKnockoutScores(koMatches);
    PLAYERS.forEach(p => { pts[p.name] += koPts[p.name] || 0; });
  }
  return pts;
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
// Max knockout pts per team assuming they win everything:
// R32(4) + R16(4) + QF(4) + SF(4) + Final win(4) + WC bonus(5) = 25
const KNOCKOUT_MAX = 25;

function teamGroupPts(team, matches) {
  const t = norm(team);
  let pts = 0, played = 0;
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const isHome = norm(m.home) === t;
    const isAway = norm(m.away) === t;
    if (!isHome && !isAway) return;
    played++;
    if (isHome) { if (m.homeScore > m.awayScore) pts+=3; else if (m.homeScore===m.awayScore) pts+=1; }
    if (isAway) { if (m.awayScore > m.homeScore) pts+=3; else if (m.homeScore===m.awayScore) pts+=1; }
  });
  return { pts, played };
}

// Max additional knockout pts a team can still earn, counting only rounds
// from their current position onward (so it shrinks as they're eliminated
// round by round, not just all-or-nothing).
function koMaxRemaining(team, koMatches) {
  if (!koMatches || !koMatches.length) return KNOCKOUT_MAX; // bracket not seeded yet, assume full potential
  const t = norm(team);

  // Has this team appeared anywhere in the bracket?
  const appeared = koMatches.some(m => (m.home && norm(m.home)===t) || (m.away && norm(m.away)===t));
  if (!appeared) return 0; // didn't make the bracket (group stage exit), no knockout pts possible

  const currentRound = teamCurrentRound(team, koMatches); // null if eliminated
  if (!currentRound) return 0; // eliminated, no more pts possible

  // Sum advancement pts for current round onward (best case: always win normal/ET, no pens)
  const idx = ROUND_ORDER.indexOf(currentRound);
  let max = 0;
  for (let i = idx; i < ROUND_ORDER.length; i++) {
    const r = ROUND_ORDER[i];
    if (r === "3RD") continue; // handled separately, mutually exclusive with FINAL
    if (r === "FINAL") max += KO_ADVANCE_PTS.FINAL + KO_WC_WIN_BONUS;
    else max += KO_ADVANCE_PTS[r];
  }
  return max;
}

function calcMaxPts(playerTeams, matches, koMatches) {
  let extra = 0;

  // Group stage: 3pts per remaining unplayed game
  playerTeams.forEach(team => {
    const t = norm(team);
    matches.forEach(m => {
      if (m.homeScore != null && m.awayScore != null) return;
      if (norm(m.home) === t || norm(m.away) === t) extra += 3;
    });
  });

  // Knockout stage: remaining potential based on actual bracket position
  playerTeams.forEach(team => {
    extra += koMaxRemaining(team, koMatches);
  });

  return extra;
}

function teamPts(team, matches) {
  const t = norm(team);
  let pts = 0;
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const isHome = norm(m.home) === t;
    const isAway = norm(m.away) === t;
    if (!isHome && !isAway) return;
    if (isHome) { if (m.homeScore > m.awayScore) pts+=3; else if (m.homeScore===m.awayScore) pts+=1; }
    if (isAway) { if (m.awayScore > m.homeScore) pts+=3; else if (m.homeScore===m.awayScore) pts+=1; }
  });
  return pts;
}

function teamRecord(team, matches) {
  const t = norm(team);
  let w=0,d=0,l=0,played=0;
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const isHome = norm(m.home) === t;
    const isAway = norm(m.away) === t;
    if (!isHome && !isAway) return;
    played++;
    if (isHome) { if (m.homeScore > m.awayScore) w++; else if (m.homeScore===m.awayScore) d++; else l++; }
    if (isAway) { if (m.awayScore > m.homeScore) w++; else if (m.homeScore===m.awayScore) d++; else l++; }
  });
  return {w,d,l,played};
}

// Returns the most advanced round a team currently sits in, or null if not in the bracket
// or already eliminated. "Currently sits in" = the round of the latest match they appear in
// that they haven't lost.
function teamCurrentRound(team, koMatches) {
  if (!koMatches) return null;
  const t = norm(team);
  let bestRoundIdx = -1;
  let eliminated = false;

  koMatches.forEach(m => {
    const isHome = m.home && norm(m.home) === t;
    const isAway = m.away && norm(m.away) === t;
    if (!isHome && !isAway) return;
    const w = koWinner(m);
    const lostThis = w && ((isHome && w === "away") || (isAway && w === "home"));
    if (lostThis) { eliminated = true; return; }
    const idx = ROUND_ORDER.indexOf(m.round);
    if (idx > bestRoundIdx) bestRoundIdx = idx;
  });

  if (eliminated || bestRoundIdx === -1) return null;
  return ROUND_ORDER[bestRoundIdx];
}

function teamAdvanced(team, koMatches) {
  return teamCurrentRound(team, koMatches) !== null;
}

// A team is "eliminated" if the bracket has been seeded (has real teams in it) and
// this team either never appeared (lost in groups) or appeared and lost a knockout match.
function teamEliminated(team, koMatches) {
  if (!koMatches || !koMatches.length) return false;
  const bracketSeeded = koMatches.some(m => m.home || m.away);
  if (!bracketSeeded) return false; // bracket empty, group stage still ongoing — nobody "eliminated" yet
  const t = norm(team);
  const appeared = koMatches.some(m => (m.home && norm(m.home)===t) || (m.away && norm(m.away)===t));
  if (!appeared) return true; // didn't make the knockout bracket at all
  return teamCurrentRound(team, koMatches) === null; // appeared but lost
}

                        textDecoration:eliminated?"line-through":"none",
                        opacity:eliminated?0.6:1,
                      }}>
                        {flag(t)} {t}
                      </span>
                    );
                  })}
                </div>
              </div>
              <div style={{textAlign:"right",minWidth:60,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                <div style={{fontSize:30,fontWeight:800,color:isTop?WC_RED:WC_LIGHT,lineHeight:1,fontFamily:"'Bebas Neue',sans-serif"}}>{p.pts}</div>

              </div>

            {isOpen && (
              <div style={{borderTop:"1px solid #1e2740",padding:"12px 18px 14px",background:"#0d1226"}}>
                {p.teams.map(t => {
                  const pts = teamPts(t, matches);
                  const {w,d,l,played} = teamRecord(t, matches);
                  const remaining = matches.filter(m => (norm(m.home)===norm(t)||norm(m.away)===norm(t)) && m.homeScore==null).length;
                  const currentRound = teamCurrentRound(t, koMatches);
                  const eliminated = teamEliminated(t, koMatches);
                  return (
                    <div key={t} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",borderBottom:"1px solid #1a2240",opacity:eliminated?0.55:1}}>
                      <div style={{fontSize:20}}>{flag(t)}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:700,color:eliminated?"#5a6a8a":WC_LIGHT,display:"flex",alignItems:"center",gap:6,textDecoration:eliminated?"line-through":"none"}}>
                          {t}
                          {currentRound && <span style={{fontSize:10,color:WC_GOLD,fontWeight:700,background:"#1f1a0d",border:`1px solid ${WC_GOLD}66`,borderRadius:4,padding:"1px 6px",textDecoration:"none"}}>{ROUND_LABELS[currentRound].toUpperCase()}</span>}
                          {eliminated && <span style={{fontSize:10,color:"#5a6a8a",fontWeight:700,textDecoration:"none"}}>ELIMINATED</span>}
                        </div>
                        <div style={{fontSize:11,color:"#4a5a8a",marginTop:2}}>
                          {played>0 ? `${w}W ${d}D ${l}L` : "No games played"}{remaining>0?` · ${remaining} left`:""}
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:20,fontWeight:800,color:pts>0?WC_GOLD:WC_LIGHT,fontFamily:"'Bebas Neue',sans-serif"}}>{pts}</div>
                        <div style={{fontSize:10,color:"#3a4a7a",fontWeight:700}}>PTS</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          );
        })}
      </div>
      <ScoringKey/>
    </div>
  );
}

function BracketMatchCard({ m, isAdmin, onEdit }) {
  const w = koWinner(m);
  const hasScore = m.homeScore != null && m.awayScore != null;
  const wasPens = hasScore && m.homeScore === m.awayScore;
  const homeNorm = m.home ? norm(m.home) : null;
  const awayNorm = m.away ? norm(m.away) : null;
  const hp = homeNorm ? t2p[homeNorm] : null;
  const ap = awayNorm ? t2p[awayNorm] : null;

  return (
    <div style={{background:"#111827",border:`1px solid ${hasScore?WC_BLUE+"44":"#1e2740"}`,borderRadius:10,padding:"10px 12px",position:"relative",minWidth:200}}>
      {isAdmin && (
        <button onClick={()=>onEdit(m)} style={{position:"absolute",top:6,right:6,background:WC_BLUE,border:"none",borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:700,color:"#fff",cursor:"pointer"}}>✏️</button>
      )}
      <div style={{fontSize:9,color:"#3a4a7a",marginBottom:2,fontWeight:700}}>{m.venue} · {fmtD(m.date)} · {fmtT(m.time)}</div>
      {m.desc && !m.home && !m.away && (
        <div style={{fontSize:9,color:"#4a5a8a",marginBottom:6,fontStyle:"italic"}}>{m.desc}</div>
      )}
      {[["home",m.home,m.homeScore],["away",m.away,m.awayScore]].map(([side,team,score]) => {
        const isWinner = w === side;
        const owner = side==="home" ? hp : ap;
        return (
          <div key={side} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",opacity:hasScore&&!isWinner?0.5:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
              <span style={{fontSize:13}}>{team?flag(norm(team)):"❔"}</span>
              <span style={{fontSize:13,fontWeight:isWinner?800:600,color:isWinner?WC_LIGHT:"#8090c0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {team || "TBD"}
              </span>
              {owner && <span style={{fontSize:9,color:WC_GOLD,fontWeight:700,whiteSpace:"nowrap"}}>({owner})</span>}
            </div>
            {score!=null && <span style={{fontSize:15,fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",color:isWinner?WC_RED:"#5a6a9a",marginLeft:8}}>{score}</span>}
          </div>
        );
      })}
      {wasPens && <div style={{fontSize:9,color:WC_GOLD,marginTop:4,fontWeight:700}}>⚽ Won on penalties</div>}
    </div>
  );
}

function Bracket({ koMatches, isAdmin, onEdit }) {
  const grouped = {};
  koMatches.forEach(m => { if(!grouped[m.round]) grouped[m.round]=[]; grouped[m.round].push(m); });
  // Sort each round chronologically by date then time
  Object.keys(grouped).forEach(round => {
    grouped[round].sort((a,b) => {
      const aKey = a.date + " " + a.time;
      const bKey = b.date + " " + b.time;
      return aKey.localeCompare(bKey);
    });
  });

  return (
    <div>
      <h2 style={{margin:"0 0 16px",fontSize:22,fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.05em",color:WC_LIGHT}}>Knockout Bracket</h2>
      <div style={{fontSize:12,color:"#4a5a8a",marginBottom:20,lineHeight:1.5}}>
        Teams fill in once group stage ends June 27. {isAdmin?"Tap ✏️ to enter teams, scores, and penalty winners.":""}
      </div>
      <div style={{overflowX:"auto",paddingBottom:8}}>
        <div style={{display:"flex",gap:16,minWidth:"max-content"}}>
          {ROUND_ORDER.map(round => (
            <div key={round} style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{fontSize:13,fontWeight:800,color:WC_RED,textTransform:"uppercase",letterSpacing:"0.1em",textAlign:"center",marginBottom:4,fontFamily:"'Bebas Neue',sans-serif"}}>
                {ROUND_LABELS[round]}
              </div>
              {(grouped[round]||[]).map(m => (
                <BracketMatchCard key={round+m.slot} m={m} isAdmin={isAdmin} onEdit={onEdit}/>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const saved = loadSaved();
  const savedKO = loadSavedKO();
  const [matches,setMatches]=useState(()=>applyMap(ALL_MATCHES,saved));
  const [koMatches,setKoMatches]=useState(()=>applyKOMap(KNOCKOUT_MATCHES, savedKO));
  const [lastSaved,setLastSaved]=useState(()=>saved?._updatedAt?new Date(saved._updatedAt):null);
  const [syncing,setSyncing]=useState(true);
  const [tab,setTab]=useState("leaderboard");
  const [isAdmin,setIsAdmin]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [editMatch,setEditMatch]=useState(null);
  const [editKO,setEditKO]=useState(null);

  // On mount: load from JSONbin so all viewers see latest scores (group + knockout)
  React.useEffect(() => {
    (async () => {
      const remote = await loadRemote();
      if (remote && remote._updatedAt) {
        const localTs = saved?._updatedAt || "";
        if (!localTs || remote._updatedAt > localTs) {
          setMatches(applyMap(ALL_MATCHES, remote));
          if (remote._ko) setKoMatches(applyKOMap(KNOCKOUT_MATCHES, remote._ko));
          setLastSaved(new Date(remote._updatedAt));
          try { localStorage.setItem(SK, JSON.stringify(remote)); } catch{}
          if (remote._ko) { try { localStorage.setItem(KO_SK, JSON.stringify(remote._ko)); } catch{} }
        }
      }
      setSyncing(false);
    })();
  }, []);

  const handleSaveScore = useCallback((match,hs,as_) => {
    const updated = matches.map(m => m.home===match.home&&m.away===match.away&&m.date===match.date ? {...m,homeScore:hs,awayScore:as_} : m);
    setMatches(updated);
    const sm=buildMap(updated); sm._updatedAt=new Date().toISOString();
    const koMap = buildKOMap(koMatches);
    saveDat(sm, koMap); setLastSaved(new Date()); setEditMatch(null);
  },[matches, koMatches]);

  const handleSaveKO = useCallback((match, updates) => {
    const updatedKO = koMatches.map(m => m.round===match.round&&m.slot===match.slot ? {...m,...updates} : m);
    setKoMatches(updatedKO);
    const sm = buildMap(matches); sm._updatedAt = new Date().toISOString();
    const koMap = buildKOMap(updatedKO);
    saveDat(sm, koMap); setLastSaved(new Date()); setEditKO(null);
  },[matches, koMatches]);

  const scores = calcScores(matches, koMatches);
  const ranked = PLAYERS.map(p=>({...p,pts:scores[p.name]})).sort((a,b)=>b.pts-a.pts);

  const TABS = [
    {id:"leaderboard", label:"🏅", full:"Standings"},
    {id:"today",       label:"⚽", full:"Today"},
    {id:"bracket",     label:"🏆", full:"Bracket"},
    {id:"all",         label:"📋", full:"Group Matches"},
    ...(isAdmin?[{id:"admin",label:"⚙️",full:"Admin"}]:[]),
  ];

  return (
    <div style={{minHeight:"100vh",background:"#0b0f1a",color:WC_LIGHT,fontFamily:"'Noto Sans',system-ui,sans-serif"}}>
      {showPin&&<PinModal onSuccess={()=>{setIsAdmin(true);setShowPin(false);setTab("admin");}} onClose={()=>setShowPin(false)}/>}
      {editMatch&&<ScoreModal match={editMatch} onSave={(h,a)=>handleSaveScore(editMatch,h,a)} onClose={()=>setEditMatch(null)}/>}
      {editKO&&<KOEditModal match={editKO} onSave={(updates)=>handleSaveKO(editKO,updates)} onClose={()=>setEditKO(null)}/>}

      {/* HEADER */}
      <div style={{background:`linear-gradient(180deg,#0d1226 0%,#0b0f1a 100%)`,borderBottom:`2px solid ${WC_BLUE}33`,paddingBottom:0}}>
        {/* Top red bar */}
        <div style={{height:4,background:`linear-gradient(90deg,${WC_RED},${WC_BLUE})`}}/>

        <div style={{maxWidth:960,margin:"0 auto",padding:"16px 20px 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:16}}>
            {/* Logo + Title */}
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <WCLogo/>
              <div>
                <div style={{fontSize:10,letterSpacing:"0.25em",textTransform:"uppercase",color:WC_RED,fontWeight:800,marginBottom:2}}>FIFA World Cup 2026</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:"0.05em",lineHeight:1}}>
                  BING BONG
                </div>
              </div>
            </div>
            {/* Admin button */}
            <button onClick={()=>isAdmin?(setIsAdmin(false),setTab("leaderboard")):setShowPin(true)}
              style={{background:isAdmin?`${WC_RED}22`:"#111827",border:`1px solid ${isAdmin?WC_RED:WC_BLUE+"44"}`,borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,color:isAdmin?WC_RED:"#5a6a9a",cursor:"pointer",letterSpacing:"0.05em"}}>
              {isAdmin?"🔓 EXIT ADMIN":"🔐 ADMIN"}
            </button>
          </div>

          {/* Status */}
          <div style={{fontSize:11,color:"#3a4a7a",marginBottom:12,fontWeight:600}}>
            {syncing ? "⏳ Syncing scores..." : lastSaved ? `✅ Last updated ${lastSaved.toLocaleString()}` : "No scores entered yet"}
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:2,overflowX:"auto",paddingBottom:0}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background:tab===t.id?WC_BLUE:"transparent",
                color:tab===t.id?"#fff":"#5a6a9a",
                border:"none",borderRadius:"8px 8px 0 0",
                padding:"10px 14px",fontSize:12,fontWeight:700,
                cursor:"pointer",whiteSpace:"nowrap",
                borderBottom:tab===t.id?`2px solid ${WC_RED}`:"2px solid transparent",
                letterSpacing:"0.04em",
              }}>
                {t.label} {t.full}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 20px"}}>
        {tab==="leaderboard"&&<Leaderboard ranked={ranked} matches={matches} koMatches={koMatches}/>}
        
        {tab==="today"&&<MatchList
          matches={[...matches.filter(m=>m.date===todayS), ...koMatches.filter(m=>m.date===todayS)]}
          title={`Today · ${fmtD(todayS)}`}
          isAdmin={isAdmin}
          onEdit={(m)=>m.round?setEditKO(m):setEditMatch(m)}
        />}
        
        {tab==="all"&&<AllMatches matches={matches} isAdmin={isAdmin} onEdit={setEditMatch}/>}
        {tab==="bracket"&&<Bracket koMatches={koMatches} isAdmin={isAdmin} onEdit={setEditKO}/>}
        {tab==="admin"&&isAdmin&&<AdminView matches={matches} onEdit={setEditMatch}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
