const norm = n => !n ? n : (ALIASES[n.toLowerCase()] || n);
const t2p = {};
PLAYERS.forEach(p => p.teams.forEach(t => { t2p[t] = p.name; }));

function calcScores(matches) {
  const pts = {};
  PLAYERS.forEach(p => { pts[p.name] = 0; });
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const hp = t2p[norm(m.home)], ap = t2p[norm(m.away)];
    if (m.homeScore > m.awayScore) { if(hp) pts[hp]+=3; }
    else if (m.homeScore < m.awayScore) { if(ap) pts[ap]+=3; }
    else { if(hp) pts[hp]+=1; if(ap) pts[ap]+=1; }
  });
  return pts;
}

// ── SCORE ENTRY MODAL ─────────────────────────────────────────────────────────
function ScoreModal({ match, onSave, onClose }) {
  const [hs, setHs] = useState(match.homeScore != null ? String(match.homeScore) : "");
  const [as_, setAs] = useState(match.awayScore != null ? String(match.awayScore) : "");

  const save = () => {
    const h = parseInt(hs), a = parseInt(as_);
    if (isNaN(h) || isNaN(a) || h < 0 || a < 0) return;
    onSave(h, a);
  };

  const clear = () => onSave(null, null);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"#1a2240",border:"1px solid #2a3a6e",borderRadius:14,padding:24,width:"100%",maxWidth:360}}>
        <div style={{fontSize:13,color:"#6b7fc4",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.1em"}}>Enter Score</div>
        <div style={{fontSize:15,fontWeight:700,marginBottom:20,textAlign:"center"}}>
          {flag(norm(match.home))} {match.home} vs {flag(norm(match.away))} {match.away}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:12,marginBottom:24}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,color:"#6b7fc4",marginBottom:6}}>{match.home}</div>
            <input
              type="number" min="0" max="99" value={hs}
              onChange={e=>setHs(e.target.value)}
              style={{width:"100%",background:"#0d1528",border:"1px solid #2a3a6e",borderRadius:8,padding:"12px 8px",fontSize:28,fontWeight:800,color:"#e8ecf4",textAlign:"center",outline:"none"}}
            />
          </div>
          <div style={{fontSize:18,color:"#4a5a8a",fontWeight:700}}>–</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:12,color:"#6b7fc4",marginBottom:6}}>{match.away}</div>
            <input
              type="number" min="0" max="99" value={as_}
              onChange={e=>setAs(e.target.value)}
              style={{width:"100%",background:"#0d1528",border:"1px solid #2a3a6e",borderRadius:8,padding:"12px 8px",fontSize:28,fontWeight:800,color:"#e8ecf4",textAlign:"center",outline:"none"}}
            />
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"transparent",border:"1px solid #2a3a6e",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,color:"#6b7fc4",cursor:"pointer"}}>Cancel</button>

            <button onClick={clear} style={{flex:1,background:"transparent",border:"1px solid #f87171",borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,color:"#f87171",cursor:"pointer"}}>Clear</button>
          )}

        </div>
      </div>
    </div>
  );
}

function PinModal({ onSuccess, onClose }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState(false);
  const check = () => {
    if (pin === ADMIN_PIN) { onSuccess(); }
    else { setErr(true); setPin(""); }
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"#1a2240",border:"1px solid #2a3a6e",borderRadius:14,padding:24,width:"100%",maxWidth:300,textAlign:"center"}}>

        <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>Admin Access</div>
        <div style={{fontSize:12,color:"#6b7fc4",marginBottom:20}}>Enter PIN to edit scores</div>
        <input
          type="password" maxLength={6} value={pin}
          onChange={e=>{setPin(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&check()}
          placeholder="PIN"
          style={{width:"100%",background:"#0d1528",border:`1px solid ${err?"#f87171":"#2a3a6e"}`,borderRadius:8,padding:"12px",fontSize:20,color:"#e8ecf4",textAlign:"center",outline:"none",marginBottom:err?4:16,letterSpacing:"0.3em"}}

}

                <div style={{background:has?"#1e2e5a":"#0d1528",borderRadius:8,padding:"8px 14px",textAlign:"center",minWidth:70}}>
                  {has
                    ? <div style={{fontSize:22,fontWeight:800}}>{m.homeScore} <span style={{color:"#4a5a8a",fontSize:16}}>–</span> {m.awayScore}</div>
                    : <div style={{fontSize:13,color:"#4a5a8a",fontWeight:600}}>vs</div>}
                </div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:15,fontWeight:700}}>{flag(away)} {away}</div>
                  {ap&&<div style={{fontSize:11,color:"#4a7cf7",marginTop:2}}>👤 {ap}</div>}
                </div>
              </div>
              {isAdmin && (
                <button onClick={()=>onEdit(m)} style={{position:"absolute",top:10,right:10,background:"#1e2a4a",border:"1px solid #2a3a6e",borderRadius:6,padding:"4px 10px",fontSize:11,fontWeight:600,color:"#4a7cf7",cursor:"pointer"}}>
                  ✏️ Edit
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── ADMIN: all matches view ───────────────────────────────────────────────────
function AdminAllMatches({ matches, onEdit }) {
  const grouped = {};
  matches.forEach(m => { if (!grouped[m.date]) grouped[m.date]=[]; grouped[m.date].push(m); });
  return (
    <div>
      <h2 style={{margin:"0 0 16px",fontSize:18,fontWeight:700,color:"#c8d4f8"}}>All Matches — Edit Scores</h2>
      {Object.keys(grouped).sort().map(date => (
        <div key={date} style={{marginBottom:24}}>
          <div style={{fontSize:12,color:"#6b7fc4",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1e2a4a"}}>
            {fmtD(date)}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {grouped[date].map((m,i) => {
              const has = m.homeScore != null && m.awayScore != null;
              return (
                <div key={i} onClick={()=>onEdit(m)} style={{background:"#131929",border:"1px solid #1e2a4a",borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",gap:12}}>
                  <div style={{fontSize:13,fontWeight:600,flex:1}}>{flag(norm(m.home))} {m.home}</div>
                  <div style={{background:has?"#1e2e5a":"#0d1528",borderRadius:6,padding:"6px 12px",textAlign:"center",minWidth:60,fontSize:has?16:12,fontWeight:800,color:has?"#e8ecf4":"#4a5a8a",whiteSpace:"nowrap"}}>
                    {has ? `${m.homeScore}–${m.awayScore}` : "vs"}
                  </div>
                  <div style={{fontSize:13,fontWeight:600,flex:1,textAlign:"right"}}>{m.away} {flag(norm(m.away))}</div>
                  <div style={{fontSize:11,color:"#4a7cf7",marginLeft:8}}>✏️</div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function App() {
  const saved = loadSaved();
  const [matches, setMatches] = useState(() => applyMap(ALL_MATCHES, saved));
  const [lastSaved, setLastSaved] = useState(() => saved?._updatedAt ? new Date(saved._updatedAt) : null);
  const [tab, setTab] = useState("leaderboard");
  const [isAdmin, setIsAdmin] = useState(false);
  const [showPin, setShowPin] = useState(false);
  const [editMatch, setEditMatch] = useState(null);

  const handleSaveScore = useCallback((match, hs, as_) => {
    const updated = matches.map(m =>
      m.home === match.home && m.away === match.away && m.date === match.date
        ? { ...m, homeScore: hs, awayScore: as_ }
        : m
    );
    setMatches(updated);
    const sm = buildMap(updated);
    sm._updatedAt = new Date().toISOString();
    saveDat(sm);
    setLastSaved(new Date());
    setEditMatch(null);
  }, [matches]);

  const scores = calcScores(matches);
  const ranked = PLAYERS.map(p => ({...p, pts: scores[p.name]})).sort((a,b) => b.pts - a.pts);

  const tabs = [
    {id:"leaderboard", label:"🏅 Standings"},
    {id:"yesterday",   label:`📅 ${fmtD(ydS)}`},
    {id:"today",       label:"⚽ Today"},
    {id:"tomorrow",    label:"🔜 Tomorrow"},
    ...(isAdmin ? [{id:"admin", label:"⚙️ Admin"}] : []),
  ];

  return (
    <div style={{minHeight:"100vh",background:"#0a0f1e",color:"#e8ecf4",fontFamily:"'Inter',system-ui,sans-serif"}}>
      {showPin && <PinModal onSuccess={()=>{setIsAdmin(true);setShowPin(false);setTab("admin");}} onClose={()=>setShowPin(false)}/>}
      {editMatch && <ScoreModal match={editMatch} onSave={(h,a)=>handleSaveScore(editMatch,h,a)} onClose={()=>setEditMatch(null)}/>}

      <div style={{background:"linear-gradient(135deg,#1a1f3c,#0d1528)",borderBottom:"2px solid #2a3a6e",padding:"24px 20px 0"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:20}}>
            <div>
              <div style={{fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:"#6b7fc4",marginBottom:4}}>🏆 2026 FIFA World Cup</div>
              <h1 style={{margin:0,fontSize:28,fontWeight:800,letterSpacing:"-0.02em"}}>Bing Bong <span style={{color:"#4a7cf7"}}>Fantasy</span></h1>
            </div>
            <button
              onClick={()=>isAdmin?(setIsAdmin(false),setTab("leaderboard")):setShowPin(true)}
              style={{background:isAdmin?"#2a1f3a":"#1e2a4a",border:`1px solid ${isAdmin?"#7c4af7":"#2a3a6e"}`,borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:600,color:isAdmin?"#a07cf7":"#6b7fc4",cursor:"pointer"}}
            >
              {isAdmin ? "🔓 Exit Admin" : "🔐 Admin"}
            </button>
          </div>
          <div style={{fontSize:11,color:"#4a5a8a",marginBottom:4}}>
            {lastSaved ? `✅ Last updated ${lastSaved.toLocaleString()}` : "No scores entered yet"}
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"#4a7cf7":"transparent",color:tab===t.id?"#fff":"#6b7fc4",border:"none",borderRadius:"8px 8px 0 0",padding:"10px 16px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                {t.label}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 20px"}}>
        {tab==="leaderboard" && <Leaderboard ranked={ranked}/>}
        {tab==="yesterday" && <MatchList matches={matches.filter(m=>m.date===ydS)} title="Yesterday's Results" isAdmin={isAdmin} onEdit={setEditMatch}/>}
        {tab==="today"     && <MatchList matches={matches.filter(m=>m.date===todayS)} title="Today's Matches" isAdmin={isAdmin} onEdit={setEditMatch}/>}
        {tab==="tomorrow"  && <MatchList matches={matches.filter(m=>m.date===tmS)} title="Tomorrow's Fixtures" isAdmin={isAdmin} onEdit={setEditMatch}/>}
        {tab==="admin"     && isAdmin && <AdminAllMatches matches={matches} onEdit={setEditMatch}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
