function calcScores(matches) {
  const pts = {};
  PLAYERS.forEach(p => { pts[p.name] = 0; });
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const hp = t2p[norm(m.home)], ap = t2p[norm(m.away)];
    if (m.homeScore > m.awayScore) { if(hp) pts[hp]+=3; }
    else if (m.homeScore < m.awayScore) { if(ap) pts[ap]+=3; }
    else { if(hp) pts[hp]+=1; if(ap) pts[ap]+=1; }
  });
  return pts;
}

function MatchCard({ m, isAdmin, onEdit, compact }) {
  const home = norm(m.home), away = norm(m.away);
  const hp = t2p[home], ap = t2p[away];
  const has = m.homeScore != null && m.awayScore != null;
  return (
    <div style={{background:"#111827",border:`1px solid ${has?"#2A398D33":"#1e2740"}`,borderRadius:12,padding:compact?"10px 14px":"14px 18px",position:"relative",overflow:"hidden"}}>
      {has && <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${WC_RED},${WC_BLUE})`}}/>}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:11,color:"#4a5e8a"}}>
        <span style={{background:"#1a2340",borderRadius:4,padding:"2px 7px",fontWeight:700,color:"#7a8fc4",letterSpacing:"0.05em"}}>GRP {m.group}</span>
        <span>{m.venue} · {fmtT(m.time)}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:10}}>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:compact?13:15,fontWeight:700}}>{flag(home)} {home}</div>
          {hp&&<div style={{fontSize:10,color:"#ffffff",marginTop:2,fontWeight:600}}>{hp}</div>}
        </div>
        <div style={{background:has?"#1a2a50":"#0d1528",borderRadius:8,padding:compact?"6px 10px":"8px 14px",textAlign:"center",minWidth:compact?54:70,border:`1px solid ${has?WC_BLUE+"44":"#1e2740"}`}}>

            ? <div style={{fontSize:compact?18:22,fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.05em",color:WC_LIGHT}}>{m.homeScore}<span style={{color:"#4a5a8a",fontSize:compact?14:16,margin:"0 2px"}}>–</span>{m.awayScore}</div>

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
// Max knockout pts per team assuming they win everything:
// R32(4) + R16(4) + QF(4) + SF(4) + Final win(4) + WC bonus(5) = 25
const KNOCKOUT_MAX = 25;

function teamGroupPts(team, matches) {
  const t = norm(team);
  let pts = 0, played = 0;
  matches.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    const isHome = norm(m.home) === t;
    const isAway = norm(m.away) === t;
    if (!isHome && !isAway) return;
    played++;
    if (isHome) { if (m.homeScore > m.awayScore) pts+=3; else if (m.homeScore===m.awayScore) pts+=1; }
    if (isAway) { if (m.awayScore > m.homeScore) pts+=3; else if (m.homeScore===m.awayScore) pts+=1; }
  });
  return { pts, played };
}

function calcMaxPts(playerTeams, matches) {
  let extra = 0;

  // Group stage: 3pts per remaining unplayed game
  playerTeams.forEach(team => {
    const t = norm(team);
    matches.forEach(m => {
      if (m.homeScore != null && m.awayScore != null) return;
      if (norm(m.home) === t || norm(m.away) === t) extra += 3;
    });
  });

  // Knockout stage: 25pts per team still alive
  // A team is eliminated only if they've played all 3 group games and have 0 pts
  playerTeams.forEach(team => {
    const { pts, played } = teamGroupPts(team, matches);
    const eliminated = played >= 3 && pts === 0;
    if (!eliminated) extra += KNOCKOUT_MAX;
  });

  return extra;
}

function Leaderboard({ ranked, matches }) {
  const medals = ["🥇","🥈","🥉"];
  return (
    <div>
      <h2 style={{margin:"0 0 16px",fontSize:22,fontWeight:700,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.05em",color:WC_LIGHT}}>Season Standings</h2>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {ranked.map((p,i) => {
          const maxPts = calcMaxPts(p.teams, matches);
          const potential = p.pts + maxPts;
          // Rank accounting for ties: count how many players have strictly more pts
          const rank = ranked.filter(o => o.pts > p.pts).length;
          const isTop = rank === 0;
          return (
          <div key={p.name} style={{
            background: isTop ? `linear-gradient(135deg,#1a2350,#0f1530)` : "#111827",
            border: `1px solid ${isTop?WC_BLUE+"88":rank===1?"#2a3a5a":"#1e2740"}`,
            borderRadius:12,padding:"14px 18px",
            position:"relative",overflow:"hidden",
          }}>
            {isTop && <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${WC_RED},${WC_BLUE})`}}/>}
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:34,textAlign:"center",fontSize:rank<3?24:14,fontWeight:800,color:rank<3?"#fff":"#3a4a7a",fontFamily:rank>=3?"'Bebas Neue',sans-serif":"inherit"}}>
                {medals[rank]||rank+1}
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:16,marginBottom:4,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.03em"}}>{p.name}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {p.teams.map(t=>(
                    <span key={t} style={{fontSize:11,color:"#7a8fc4",background:"#0d1226",borderRadius:5,padding:"2px 8px",fontWeight:600}}>
                      {flag(t)} {t}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{textAlign:"right",minWidth:60}}>
                <div style={{fontSize:30,fontWeight:800,color:isTop?WC_RED:WC_LIGHT,lineHeight:1,fontFamily:"'Bebas Neue',sans-serif"}}>{p.pts}</div>
                <div style={{fontSize:10,color:"#3a4a7a",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>pts</div>
              </div>
            </div>
            <div style={{position:"absolute",bottom:8,right:12,fontSize:10,color:"#3a4a7a",fontWeight:600}}>
              max {potential} pts
            </div>
          </div>
          );
        })}
      </div>
      <ScoringKey/>
    </div>
  );
}

function ScoringKey() {
  return (
    <div style={{marginTop:24,background:"#111827",border:"1px solid #1e2740",borderRadius:12,padding:"16px 18px"}}>
      <div style={{fontSize:11,fontWeight:800,color:WC_BLUE,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:12}}>Scoring System</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"7px 20px"}}>
        {[["Group Win","3 pts"],["Group Tie","1 pt"],["Group Loss","0 pts"],["Advance (normal/ET)","4 pts"],["Advance (pens)","3 pts"],["Win 3rd Place","3 pts"],["Win World Cup","5 pts"]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#5a6a9a"}}>
            <span>{l}</span><span style={{color:WC_LIGHT,fontWeight:700}}>{v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── SCORE MODAL ───────────────────────────────────────────────────────────────
function ScoreModal({ match, onSave, onClose }) {
  const [hs, setHs] = useState(match.homeScore!=null?String(match.homeScore):"");
  const [as_, setAs] = useState(match.awayScore!=null?String(match.awayScore):"");
  const save = () => { const h=parseInt(hs),a=parseInt(as_); if(!isNaN(h)&&!isNaN(a)&&h>=0&&a>=0) onSave(h,a); };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"#111827",border:`2px solid ${WC_BLUE}`,borderRadius:16,padding:24,width:"100%",maxWidth:360}}>
        <div style={{height:3,background:`linear-gradient(90deg,${WC_RED},${WC_BLUE})`,borderRadius:2,marginBottom:20,margin:"-24px -24px 20px"}}/>
        <div style={{fontSize:11,color:WC_BLUE,marginBottom:12,textTransform:"uppercase",letterSpacing:"0.15em",fontWeight:800}}>Enter Score</div>
        <div style={{fontSize:14,fontWeight:700,marginBottom:20,textAlign:"center",color:WC_LIGHT}}>
          {flag(norm(match.home))} {match.home} vs {flag(norm(match.away))} {match.away}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:12,marginBottom:20}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#5a6a9a",marginBottom:6,fontWeight:700}}>{match.home}</div>
            <input type="number" min="0" max="99" value={hs} onChange={e=>setHs(e.target.value)}
              style={{width:"100%",background:"#0d1226",border:`2px solid ${WC_BLUE}44`,borderRadius:10,padding:"14px 8px",fontSize:32,fontWeight:800,color:WC_LIGHT,textAlign:"center",outline:"none",fontFamily:"'Bebas Neue',sans-serif"}}/>
          </div>
          <div style={{fontSize:24,color:"#3a4a7a",fontWeight:900,fontFamily:"'Bebas Neue',sans-serif"}}>–</div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:11,color:"#5a6a9a",marginBottom:6,fontWeight:700}}>{match.away}</div>
            <input type="number" min="0" max="99" value={as_} onChange={e=>setAs(e.target.value)}
              style={{width:"100%",background:"#0d1226",border:`2px solid ${WC_BLUE}44`,borderRadius:10,padding:"14px 8px",fontSize:32,fontWeight:800,color:WC_LIGHT,textAlign:"center",outline:"none",fontFamily:"'Bebas Neue',sans-serif"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"transparent",border:"1px solid #2a3a5a",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,color:"#5a6a9a",cursor:"pointer"}}>Cancel</button>
          {match.homeScore!=null&&<button onClick={()=>onSave(null,null)} style={{flex:1,background:"transparent",border:`1px solid ${WC_RED}66`,borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,color:WC_RED,cursor:"pointer"}}>Clear</button>}
          <button onClick={save} style={{flex:2,background:`linear-gradient(135deg,${WC_RED},#b01018)`,border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer"}}>Save Score</button>
        </div>
      </div>
    </div>
  );
}

// ── PIN MODAL ─────────────────────────────────────────────────────────────────
function PinModal({ onSuccess, onClose }) {
  const [pin,setPin]=useState(""); const [err,setErr]=useState(false);
  const check=()=>{if(pin===ADMIN_PIN)onSuccess();else{setErr(true);setPin("");}};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"#111827",border:`2px solid ${WC_BLUE}`,borderRadius:16,padding:24,width:"100%",maxWidth:300,textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:8}}>🔐</div>
        <div style={{fontSize:20,fontWeight:800,fontFamily:"'Bebas Neue',sans-serif",letterSpacing:"0.05em",marginBottom:4}}>Admin Access</div>
        <div style={{fontSize:12,color:"#5a6a9a",marginBottom:20}}>Enter PIN to edit scores</div>
        <input type="password" maxLength={6} value={pin} onChange={e=>{setPin(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="••••"
          style={{width:"100%",background:"#0d1226",border:`2px solid ${err?WC_RED:WC_BLUE+"44"}`,borderRadius:10,padding:"14px",fontSize:24,color:WC_LIGHT,textAlign:"center",outline:"none",marginBottom:err?4:16,letterSpacing:"0.4em",fontFamily:"'Bebas Neue',sans-serif"}}/>
        {err&&<div style={{fontSize:12,color:WC_RED,marginBottom:12,fontWeight:700}}>Wrong PIN</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,background:"transparent",border:"1px solid #2a3a5a",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,color:"#5a6a9a",cursor:"pointer"}}>Cancel</button>
          <button onClick={check} style={{flex:1,background:`linear-gradient(135deg,${WC_BLUE},#1a2a6e)`,border:"none",borderRadius:8,padding:"11px",fontSize:13,fontWeight:700,color:"#fff",cursor:"pointer"}}>Enter</button>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN ALL MATCHES ─────────────────────────────────────────────────────────
function AdminView({ matches, onEdit }) {
  return <AllMatches matches={matches} isAdmin={true} onEdit={onEdit}/>;
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const saved = loadSaved();
  const [matches,setMatches]=useState(()=>applyMap(ALL_MATCHES,saved));
  const [lastSaved,setLastSaved]=useState(()=>saved?._updatedAt?new Date(saved._updatedAt):null);
  const [tab,setTab]=useState("leaderboard");
  const [isAdmin,setIsAdmin]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [editMatch,setEditMatch]=useState(null);

  const handleSaveScore = useCallback((match,hs,as_) => {
    const updated = matches.map(m => m.home===match.home&&m.away===match.away&&m.date===match.date ? {...m,homeScore:hs,awayScore:as_} : m);
    setMatches(updated);
    const sm=buildMap(updated); sm._updatedAt=new Date().toISOString();
    saveDat(sm); setLastSaved(new Date()); setEditMatch(null);
  },[matches]);

  const scores = calcScores(matches);
  const ranked = PLAYERS.map(p=>({...p,pts:scores[p.name]})).sort((a,b)=>b.pts-a.pts);

  const TABS = [
    {id:"leaderboard", label:"🏅", full:"Standings"},
    {id:"today",       label:"⚽", full:"Today"},
    {id:"all",         label:"📋", full:"All Matches"},
    ...(isAdmin?[{id:"admin",label:"⚙️",full:"Admin"}]:[]),
  ];

  return (
    <div style={{minHeight:"100vh",background:"#0b0f1a",color:WC_LIGHT,fontFamily:"'Noto Sans',system-ui,sans-serif"}}>
      {showPin&&<PinModal onSuccess={()=>{setIsAdmin(true);setShowPin(false);setTab("admin");}} onClose={()=>setShowPin(false)}/>}
      {editMatch&&<ScoreModal match={editMatch} onSave={(h,a)=>handleSaveScore(editMatch,h,a)} onClose={()=>setEditMatch(null)}/>}

      {/* HEADER */}
      <div style={{background:`linear-gradient(180deg,#0d1226 0%,#0b0f1a 100%)`,borderBottom:`2px solid ${WC_BLUE}33`,paddingBottom:0}}>
        {/* Top red bar */}
        <div style={{height:4,background:`linear-gradient(90deg,${WC_RED},${WC_BLUE})`}}/>

        <div style={{maxWidth:960,margin:"0 auto",padding:"16px 20px 0"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:16}}>
            {/* Logo + Title */}
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <WCLogo/>
              <div>
                <div style={{fontSize:10,letterSpacing:"0.25em",textTransform:"uppercase",color:WC_RED,fontWeight:800,marginBottom:2}}>FIFA World Cup 2026</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:30,letterSpacing:"0.05em",lineHeight:1}}>
                  BING BONG
                </div>
              </div>
            </div>
            {/* Admin button */}
            <button onClick={()=>isAdmin?(setIsAdmin(false),setTab("leaderboard")):setShowPin(true)}
              style={{background:isAdmin?`${WC_RED}22`:"#111827",border:`1px solid ${isAdmin?WC_RED:WC_BLUE+"44"}`,borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,color:isAdmin?WC_RED:"#5a6a9a",cursor:"pointer",letterSpacing:"0.05em"}}>
              {isAdmin?"🔓 EXIT ADMIN":"🔐 ADMIN"}
            </button>
          </div>

          {/* Status */}
          <div style={{fontSize:11,color:"#3a4a7a",marginBottom:12,fontWeight:600}}>
            {lastSaved ? `✅ Last updated ${lastSaved.toLocaleString()}` : "No scores entered yet"}
          </div>

          {/* Tabs */}
          <div style={{display:"flex",gap:2,overflowX:"auto",paddingBottom:0}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background:tab===t.id?WC_BLUE:"transparent",
                color:tab===t.id?"#fff":"#5a6a9a",
                border:"none",borderRadius:"8px 8px 0 0",
                padding:"10px 14px",fontSize:12,fontWeight:700,
                cursor:"pointer",whiteSpace:"nowrap",
                borderBottom:tab===t.id?`2px solid ${WC_RED}`:"2px solid transparent",
                letterSpacing:"0.04em",
              }}>
                {t.label} {t.full}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:960,margin:"0 auto",padding:"24px 20px"}}>
        {tab==="leaderboard"&&<Leaderboard ranked={ranked} matches={matches}/>}
        
        {tab==="today"&&<MatchList matches={matches.filter(m=>m.date===todayS)} title={`Today · ${fmtD(todayS)}`} isAdmin={isAdmin} onEdit={setEditMatch}/>}
        
        {tab==="all"&&<AllMatches matches={matches} isAdmin={isAdmin} onEdit={setEditMatch}/>}
        {tab==="admin"&&isAdmin&&<AdminView matches={matches} onEdit={setEditMatch}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
